workflows:
  ios-simulator-preview:
    name: iOS Simulator Preview
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    # Builds automatically whenever you push to "main".
    # Change the branch name below if yours is "master" or something else.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Get Flutter packages
        working_directory: portal_layanan_publik_mobile
        script: |
          flutter packages pub get

      - name: Install CocoaPods dependencies
        working_directory: portal_layanan_publik_mobile
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Build iOS app for Simulator (no code signing needed)
        working_directory: portal_layanan_publik_mobile
        script: |
          flutter build ios --release --simulator

    artifacts:
      - portal_layanan_publik_mobile/build/ios/iphonesimulator/*.app

    publishing:
      email:
        recipients:
          - your-email@example.com   # <-- change this
        notify:
          success: true
          failure: true
